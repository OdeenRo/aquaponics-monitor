name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy via Azure CLI
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az vm run-command invoke \
              --resource-group apmf-rg \
              --name apmf-vm \
              --command-id RunShellScript \
              --scripts "cd /app && git pull && sudo docker compose -f docker-compose.prod.yml up -d --build && sudo docker image prune -f"
