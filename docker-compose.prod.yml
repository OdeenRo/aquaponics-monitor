services:
  broker:
    image: eclipse-mosquitto:2.0
    container_name: apmf-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./broker/data:/mosquitto/data
      - ./broker/log:/mosquitto/log
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: apmf-backend
    environment:
      - MQTT_HOST=broker
      - MQTT_PORT=1883
    env_file:
      - .env
    depends_on:
      - broker
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: apmf-dashboard
    ports:
      - "80:8001"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: apmf-simulator
    environment:
      - MQTT_HOST=broker
      - MQTT_PORT=1883
    depends_on:
      - broker
    restart: unless-stopped
